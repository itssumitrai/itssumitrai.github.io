name: Deploy to GitHub Pages
on:
    push:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - name: Install
              run: npm ci
            - name: Build
              run: npm run build
              env:
                  PUBLIC_EMAIL: ${{ vars.PUBLIC_EMAIL }}
                  PUBLIC_GITHUB_URL: ${{ vars.PUBLIC_GITHUB_URL }}
                  PUBLIC_LINKEDIN_URL: ${{ vars.PUBLIC_LINKEDIN_URL }}
                  PUBLIC_PROFILE_PICTURE_URL: ${{ vars.PUBLIC_PROFILE_PICTURE_URL }}
                  PUBLIC_RESUME_URL: ${{ vars.PUBLIC_RESUME_URL }}
            - name: Setup Pages
              uses: actions/configure-pages@v5
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: build
    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v4
